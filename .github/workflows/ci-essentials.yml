# Any commit on main & PRs.
#
# Local:
#   act push -W .github/workflows/ci-essentials.yml -j test
#   act push -W .github/workflows/ci-essentials.yml -j changes

name: 'CI: Essentials'
on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache crates
        if: github.event_name == 'pull_request'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-stable-hash-${{ hashFiles('**/Cargo.lock') }}

      - name: Quality – cargo fmt
        run: |
          cargo fmt --all -- --check

      - name: Quality – cargo clippy
        run: |
          cargo clippy --locked --all-targets -- -D warnings

      - name: Quality – convco check
        run: |
          git show-ref
          echo Commit message: "$(git log -1 --pretty=%B)"
          curl -sSfLO https://github.com/convco/convco/releases/latest/download/convco-x86_64-unknown-linux-musl.tar.gz
          tar -xzf convco-x86_64-unknown-linux-musl.tar.gz
          chmod +x convco-x86_64-unknown-linux-musl/convco
          ./convco-x86_64-unknown-linux-musl/convco --version
          ./convco-x86_64-unknown-linux-musl/convco check -c .convco
          rm -rf convco-x86_64-unknown-linux-musl convco-x86_64-unknown-linux-musl.tar.gz

      - name: Build (dev)
        run: cargo build --locked

      - name: Build (release)
        run: cargo build --locked --release

      - name: Install cargo-nextest
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-nextest@0.9.133

      - name: Test
        run: ./ci/test_full.sh

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cargo_lock: ${{ steps.filter.outputs.cargo_lock }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            cargo_lock:
              - 'Cargo.toml'
              - 'Cargo.lock'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.github/poutine.yml'
              - '.github/zizmor.yml'
              - 'renovate.json'

  cargo-audit:
    needs: changes
    if: needs.changes.outputs.cargo_lock == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/_cargo-audit.yml

  ci-security:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: ./.github/workflows/_ci-security.yml
